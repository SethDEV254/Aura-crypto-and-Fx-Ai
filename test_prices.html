<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Data Test</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #0a0e1a;
      color: #00ff88;
      padding: 20px;
    }
    .price-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .price-card {
      background: #1a1f2e;
      border: 1px solid #00ff88;
      border-radius: 8px;
      padding: 15px;
    }
    .symbol {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .price {
      font-size: 24px;
      color: #00f0ff;
    }
    .change {
      font-size: 14px;
      margin-top: 5px;
    }
    .positive { color: #00ff88; }
    .negative { color: #ff0055; }
    .status {
      margin-top: 20px;
      padding: 10px;
      background: #1a1f2e;
      border-left: 3px solid #00ff88;
    }
  </style>
</head>
<body>
  <h1>🔴 LIVE PRICE DATA TEST</h1>
  <div class="status" id="status">Initializing data connections...</div>
  
  <div class="price-grid" id="price-grid"></div>

  <script src="dataService.js"></script>
  <script>
    const symbols = ['BTCUSD', 'ETHUSD', 'SOLUSD', 'XAUUSD', 'EURUSD', 'GBPUSD', 'USDJPY'];
    const priceCards = {};

    // Create price cards
    const grid = document.getElementById('price-grid');
    symbols.forEach(symbol => {
      const card = document.createElement('div');
      card.className = 'price-card';
      card.innerHTML = `
        <div class="symbol">${symbol}</div>
        <div class="price" id="price-${symbol}">Loading...</div>
        <div class="change" id="change-${symbol}">--</div>
      `;
      grid.appendChild(card);
      priceCards[symbol] = {
        price: document.getElementById(`price-${symbol}`),
        change: document.getElementById(`change-${symbol}`)
      };
    });

    // Subscribe to updates
    symbols.forEach(symbol => {
      DataService.subscribeTicker(symbol, (tick) => {
        const card = priceCards[symbol];
        
        // Determine decimal places
        let decimals = 2;
        if (symbol.includes('BTC')) decimals = 0;
        if (symbol.includes('ETH')) decimals = 1;
        if (symbol.includes('EUR') || symbol.includes('GBP')) decimals = 5;
        if (symbol.includes('JPY')) decimals = 3;
        
        card.price.textContent = tick.price.toFixed(decimals);
        
        const changeClass = tick.change >= 0 ? 'positive' : 'negative';
        const changeSign = tick.change >= 0 ? '+' : '';
        card.change.textContent = `${changeSign}${tick.change.toFixed(2)}%`;
        card.change.className = `change ${changeClass}`;
      });
    });

    // Initialize
    DataService.init();
    
    setTimeout(() => {
      document.getElementById('status').innerHTML = `
        ✅ <strong>Connected to data sources:</strong><br>
        • Binance WebSocket (BTC, ETH, SOL)<br>
        • Binance REST API (Gold)<br>
        • Exchange Rate API (Forex)<br>
        <br>
        Prices update in real-time. Compare with TradingView.com to verify accuracy.
      `;
    }, 2000);
  </script>
</body>
</html>
